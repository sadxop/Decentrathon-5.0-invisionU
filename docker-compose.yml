services:
  postgres:
    image: postgres:16-alpine
    container_name: invisionu-postgres
    environment:
      POSTGRES_DB: invisionu
      POSTGRES_USER: invisionu
      POSTGRES_PASSWORD: invisionu_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invisionu -d invisionu"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: invisionu-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://invisionu:invisionu_secret@postgres:5432/invisionu
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

